<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create an account — Luméra by Maryam</title>
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Lora:wght@400;500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="Luméra by Maryam logo" />
        <span class="brand-text">
          <span class="name">Luméra</span><br/>
          <span class="by">BY MARYAM</span>
        </span>
      </a>
      <nav class="main-nav">
        <a href="index.html">Shop</a>
        <a href="login.html">Log in</a>
      </nav>
    </div>
  </header>

  <main class="auth-shell">
    <div class="auth-card">
      <div class="dotted-arc"></div>
      <div class="auth-head">
        <img src="assets/logo.png" alt="" />
        <h1>Join Luméra</h1>
        <p>Create an account to save favorites and chat with the assistant.</p>
      </div>

      <div class="form-error" data-form-error></div>

      <form id="register-form">
        <div class="field">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required autocomplete="name" />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" />
          <p class="field-hint">At least 6 characters.</p>
        </div>
        <button class="btn btn-gold" type="submit" style="width:100%;">Create account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
  </main>

  <script type="module">
    import { initRegisterForm } from "./js/auth.js";
    initRegisterForm(document.getElementById("register-form"));
  </script>
</body>
</html>
