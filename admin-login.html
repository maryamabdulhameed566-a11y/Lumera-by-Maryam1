<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Log In — Luméra by Maryam</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Lora:wght@400;500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
        <img src="assets/logo.png" alt="Luméra by Maryam logo" />
        <span class="brand-text">
          <span class="name">Luméra</span><br/>
          <span class="by">BY MARYAM</span>
        </span>
      </a>
      <nav class="main-nav">
        <a href="index.html">Back to shop</a>
      </nav>
    </div>
  </header>

  <main class="auth-shell">
    <div class="auth-card">
      <div class="dotted-arc"></div>
      <div class="auth-head">
        <img src="assets/logo.png" alt="" />
        <h1>Admin log in</h1>
        <p>This page is for store management only.</p>
      </div>

      <div class="form-error" data-form-error></div>
      <div class="form-success" data-form-success></div>

      <form id="admin-login-form">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username" autocapitalize="off" />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <div style="text-align:right;margin:-6px 0 18px;">
          <a href="#" data-reset-password style="font-size:0.78rem;color:var(--gold-700);">Forgot password?</a>
        </div>
        <button class="btn btn-gold" type="submit" style="width:100%;">Log in</button>
      </form>
    </div>
  </main>

  <script type="module">
    import { initAdminLoginForm } from "./js/auth.js";
    initAdminLoginForm(document.getElementById("admin-login-form"));
  </script>
</body>
</html>
